name: Build whoami Docker Image
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -f .github/workflows/dockerfile.whoami -t ghcr.io/${{ github.repository }}/traefik/whoami .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}/traefik/whoami
